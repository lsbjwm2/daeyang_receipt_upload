		function getQueryId() {
			const params = new URLSearchParams(location.search);
			return params.get("id");
		}

		function resultBadge(result) {
			const span = document.createElement("span");
			span.className = "result-pill";
			span.textContent = result || "-";

			if (result === "적합") span.classList.add("ok");
			else if (result === "부적합") span.classList.add("bad");
			else if (result === "해당 없음") span.classList.add("na");

			return span;
		}

		// 이미지 서버에서 받아오기
		function buildImageUrl(imgInfo) {
			if (!imgInfo || !imgInfo.path) return null;

			// 지금 payload 안에 전체 경로가 들어있다면, 파일명만 추출
			let raw = imgInfo.path.replace(/\\/g, "/");
			const filename = raw.split("/").pop(); // "1768195143717-IMG_1824.jpg"

			// 앱 서버가 프록시해 주는 주소로 요청
			return `/api/checksheets/image?file=${encodeURIComponent(filename)}`;
		}

		// 이미지 모달 제어
		const imageModal = document.getElementById("imageModal");
		const imageModalImg = document.getElementById("imageModalImg");
		const imageModalClose = document.querySelector(".image-modal-close");

		function openImageViewer(src) {
			if (!imageModal || !imageModalImg) return;
			imageModalImg.src = src;
			imageModal.classList.add("open");
			imageModal.setAttribute("aria-hidden", "false");
			document.body.classList.add("no-scroll");
		}

		function closeImageViewer() {
			if (!imageModal || !imageModalImg) return;
			imageModalImg.src = "";
			imageModal.classList.remove("open");
			imageModal.setAttribute("aria-hidden", "true");
			document.body.classList.remove("no-scroll");
		}

		if (imageModalClose) {
			imageModalClose.addEventListener("click", (e) => {
				e.stopPropagation();
				closeImageViewer();
			});
		}

		// 모달 배경 클릭 시 닫기
		if (imageModal) {
			imageModal.addEventListener("click", (e) => {
				if (e.target === imageModal) {
					closeImageViewer();
				}
			});
		}

		// ESC 로도 닫기 (선택)
		/*document.addEventListener("keydown", (e) => {

		function renderDetail(dto) {
			const payload = dto.payload;

			document.getElementById("detailDate").textContent = dto.checkDate;
			document.getElementById("detailDept").textContent = dto.dept;
			document.getElementById("detailPlace").textContent = dto.place;
			document.getElementById("detailInspector").textContent = dto.inspector;
			document.getElementById("detailTime").textContent =
				`${dto.startTime} ~ ${dto.endTime}`;

			const area = document.getElementById("sectionsArea");
			area.innerHTML = "";

			sections.forEach((sec) => {
				const secData = payload.sections?.[sec.id] || {};

				const card = document.createElement("article");
				card.className = "section-card";
				card.innerHTML = `<h2 class="section-title">${sec.title}</h2>`;

				const list = document.createElement("div");
				list.className = "section-items";

				sec.items.forEach((item) => {
					const itemData = secData[item.id] || {};
					const row = document.createElement("div");
					row.className = "section-item-row";

					const header = document.createElement("div");
					header.className = "section-item-header";
					const label = document.createElement("div");
					label.className = "section-item-label";
					label.textContent = item.label;

					header.appendChild(label);
					header.appendChild(resultBadge(itemData.result));

					const body = document.createElement("div");
					body.className = "section-item-body";

					if (itemData.result === "부적합" && itemData.action) {
						const action = document.createElement("div");
						action.className = "section-item-action";
						action.textContent = "조치사항: " + itemData.action;
						body.appendChild(action);
					}

					/*전자 결재 상신 방식으로 변경을 위해 이미지 첨부 기능 제거 - 260113_LHJ*/
					/*if (itemData.images && itemData.images.length > 0) {
						const filesBox = document.createElement("div");
						filesBox.className = "section-item-files";

						const labelSpan = document.createElement("div");
						labelSpan.className = "section-item-files-label";
						labelSpan.textContent = `첨부 이미지 (${itemData.images.length}개)`;
						filesBox.appendChild(labelSpan);

						const thumbs = document.createElement("div");
						thumbs.className = "section-item-thumbs";

						itemData.images.forEach((imgInfo, idx) => {
							const url = buildImageUrl(imgInfo);
							if (!url) return;

							const imgEl = document.createElement("img");
							imgEl.className = "section-item-thumb";
							imgEl.src = url;
							imgEl.alt = imgInfo.name || `첨부 이미지 ${idx + 1}`;
							imgEl.loading = "lazy";

							imgEl.addEventListener("click", () => {
								openImageViewer(url);
							});

							thumbs.appendChild(imgEl);
						});

						filesBox.appendChild(thumbs);
						body.appendChild(filesBox);
					}*/

					row.appendChild(header);
					if (body.childNodes.length > 0) {
						row.appendChild(body);
					}
					list.appendChild(row);
				});

				card.appendChild(list);
				area.appendChild(card);
			});
		}

		async function loadDetail() {
			// 1) 사번 확인
		    const empNo = localStorage.getItem(KEY);
		    if (!empNo) {
		      location.replace("/checksheet-login.html");
		      return;
		    }
			
			const id = getQueryId();
			if (!id) {
				alert("ID가 없습니다.");
				return;
			}

			const res = await fetch(`/api/checksheets/${id}`);
			if (!res.ok) {
				alert("상세 조회 중 오류가 발생했습니다.");
				return;
			}
			const dto = await res.json();
			renderDetail(dto);
		}

		window.addEventListener("load", loadDetail);
	</script>
