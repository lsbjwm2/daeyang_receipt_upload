<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<title>점검표 조회</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="css/base.css" />
	<link rel="stylesheet" href="css/checksheetList.css" />
	<link rel="shortcut icon" href="picon.ico" type="image/xicon" />
</head>

<nav class="side-menu" id="sideMenu" aria-hidden="true">
	<div class="side-menu-header">
		<span class="side-menu-title">메뉴</span>
		<button type="button" class="menu-close" aria-label="메뉴 닫기">
			✕
		</button>
	</div>
	<ul class="side-menu-list">
		<li>
			<button type="button" class="side-menu-item" id="menuForm">
				점검표 작성
			</button>
		</li>
		<li>
			<button type="button" class="side-menu-item" id="menuChecksheetList">
				점검표 조회
			</button>
		</li>
		<li>
			<button type="button" class="side-menu-item" id="menuLogout">
				로그아웃
			</button>
		</li>
	</ul>
</nav>

<div class="side-menu-backdrop" id="sideMenuBackdrop"></div>

<body>
	<div class="container">
		<header class="app-header">
			<button type="button" class="menu-toggle" aria-label="메뉴 열기">
				<span></span>
				<span></span>
				<span></span>
			</button>

			<h1 class="app-title">
				점검표 조회
			</h1>
		</header>

		<section class="filter-box">
			<div class="row">
				<label>기간</label>
				<div class="filter-row">
					<input type="date" id="fromDate" />
					<span class="filter-sep">~</span>
					<input type="date" id="toDate" />
				</div>
			</div>

			<div class="filter-row filter-row-approval">
				<label for="approvalFilter">전자결재 상태</label>
				<select id="approvalFilter" class="filter-select">
					<option value="">전체</option>
					<option value="DONE">전자결재 상신 완료</option>
					<option value="NONE">전자결재 미상신</option>
				</select>
			</div>

			<button type="button" id="searchBtn" class="filter-search-btn">검색</button>
		</section>

		<div class="list-select-all-row">
			<label>
				<input type="checkbox" id="selectAllCheckbox">
				<span>전체 선택 / 해제</span>
			</label>

			<button type="button" class="delete-btn" id="deleteBtn">
				<svg class="trash-icon" viewBox="0 0 24 24">
					<path d="M9 3h6l1 2h5v2H3V5h5l1-2zm1 7h2v9h-2v-9zm4 0h2v9h-2v-9zM6 8h12l-1 13H7L6 8z" />
				</svg>
				삭제
			</button>
		</div>

		<section id="listArea" class="list-area">
			<!-- JS로 카드 렌더링 -->
		</section>

		<div id="listStatus" class="list-status" style="text-align:center; padding:12px 0; display:none;"></div>
		<div id="scrollSentinel" style="height: 1px;"></div>

		<!-- 하단 고정 버튼 -->
		<div class="actions">
			<button id="approvalSubmitBtn">전자결재 상신</button>
		</div>
	</div>

	<script>
		const menuToggle = document.querySelector(".menu-toggle");
		const sideMenu = document.getElementById("sideMenu");
		const sideMenuBackdrop = document.getElementById("sideMenuBackdrop");
		const menuCloseBtn = document.querySelector(".menu-close");
		const listContainer = document.getElementById("listArea");
		const selectAllCheckbox = document.getElementById("selectAllCheckbox");
		const approvalSubmitBtn = document.getElementById("approvalSubmitBtn");
		const area = document.getElementById("listArea");
		const deleteAllCheckbox = document.getElementById("deleteBtn");

		const KEY = "CHECKSHEET_EMP_NO";
		const userId = "CHECKSHEET_EMP_ID";
		const userPw = "CHECKSHEET_EMP_PW";

		// 화면 조회 개수 설정, 스크롤 상태 변수
		let offset = 0;
		const limit = 20;
		let hasMore = true;
		let isLoading = false;
		let observer = null;

		// === 햄버거 메뉴 토글 공통 ===
		function openMenu() {
			sideMenu.classList.add("open");
			sideMenuBackdrop.classList.add("show");
			document.body.classList.add("no-scroll");
			sideMenu.setAttribute("aria-hidden", "false");
		}

		function closeMenu() {
			sideMenu.classList.remove("open");
			sideMenuBackdrop.classList.remove("show");
			document.body.classList.remove("no-scroll");
			sideMenu.setAttribute("aria-hidden", "true");
		}

		menuToggle.addEventListener("click", openMenu);
		menuCloseBtn.addEventListener("click", closeMenu);
		sideMenuBackdrop.addEventListener("click", closeMenu);

		document.addEventListener("keydown", (e) => {
			if (e.key === "Escape" && sideMenu.classList.contains("open")) {
				closeMenu();
			}
		});

		// === 메뉴 항목 클릭 공통 ===
		document.getElementById("menuForm")
			.addEventListener("click", () => {
				closeMenu();
				// 점검표 작성 화면으로 이동
				location.href = "checkSheet.html";
			});

		document.getElementById("menuChecksheetList")
			.addEventListener("click", () => {
				closeMenu();
				// 점검표 조회 화면으로 이동
				location.href = "checksheet-list.html";
			});

		document.getElementById("menuLogout")
			.addEventListener("click", () => {
				closeMenu();
				localStorage.removeItem(KEY);
				localStorage.removeItem(userId);
				localStorage.removeItem(userPw);
				location.replace("/checksheet-login.html");
			});

		function formatTime(timeStr) {
			if (!timeStr) return "";
			// "HH:mm" → "오전/오후 HH:MM" 정도로 바꾸고 싶으면 여기서 처리
			return timeStr;
		}

		function createCard(item) {
			const card = document.createElement("article");
			card.className = "sheet-card";
			card.dataset.id = item.id;

			// 전자결재 상신 여부
			const isApproved = item.eApprovalStatus === "DONE";
			const statusText = isApproved ? "전자결재 상신 완료" : "전자결재 미상신";
			const statusClass = isApproved ? "sheet-status-done" : "sheet-status-pending";

			card.innerHTML = `
			  <label class="sheet-card-row">
			      <div class="sheet-card-row-left">
			        <input
			          type="checkbox"
			          class="sheet-select-checkbox"
			          value="${item.id}"
					  data-check-date="${item.checkDate}" /*같은 날짜만 선택해 상신할 수 있도록 날짜 심기*/
			        />
			        <span class="sheet-card-date">${item.checkDate}</span>
			      </div>
			      <span class="sheet-card-badge ${statusClass}">${statusText}</span>
			    </label>

			    <div class="sheet-card-main">
			      <div class="sheet-card-place">${item.place}</div>
			      <div class="sheet-card-inspector">점검자: ${item.inspector}</div>
			      <div class="sheet-card-time">
			        시간: ${formatTime(item.startTime)} ~ ${formatTime(item.endTime)}
			      </div>
			    </div>
			  `;

			card.addEventListener("click", (e) => {
				if (e.target.closest(".sheet-card-row")) {
					// 체크박스 클릭이면 상세 이동 막기
					return;
				}
				location.href = `checksheet-detail.html?id=${item.id}`;
			});

			return card;
		}

		// 선택된 카드 ID 모으기
		function getSelectedSheetIds() {
			return Array
				.from(document.querySelectorAll(".sheet-select-checkbox:checked"))
				.map(cb => Number(cb.value));
		}

		// 전체 선택 체크박스 상태 갱신
		function updateSelectAllState() {
			const all = document.querySelectorAll(".sheet-select-checkbox");
			const checked = document.querySelectorAll(".sheet-select-checkbox:checked");

			if (all.length === 0) {
				selectAllCheckbox.checked = false;
				selectAllCheckbox.indeterminate = false;
				return;
			}

			if (checked.length === 0) {
				selectAllCheckbox.checked = false;
				selectAllCheckbox.indeterminate = false;
			} else if (checked.length === all.length) {
				selectAllCheckbox.checked = true;
				selectAllCheckbox.indeterminate = false;
			} else {
				selectAllCheckbox.checked = false;
				selectAllCheckbox.indeterminate = true; // 일부만 선택
			}
		}

		// ✅ 전체 선택 / 해제 클릭 시
		if (selectAllCheckbox) {
			selectAllCheckbox.addEventListener("change", () => {
				const checked = selectAllCheckbox.checked;
				document
					.querySelectorAll(".sheet-select-checkbox")
					.forEach(cb => {
						cb.checked = checked;
					});
				selectAllCheckbox.indeterminate = false;
			});
		}

		// 삭제 버튼 동작
		if (deleteAllCheckbox) {
			deleteAllCheckbox.addEventListener("click", () => {
				const selectedCheckboxes = Array.from(
					document.querySelectorAll(".sheet-select-checkbox:checked")
				);

				const count = selectedCheckboxes.length;

				// 0개 선택
				if (count === 0) {
					alert("삭제할 점검표를 선택해 주세요.");
					return;
				}

				handleDeleteSubmit();
			})
		}

		// ✅ 각 카드 체크박스 변경 시, 전체 선택 상태 업데이트
		if (listContainer) {
			listContainer.addEventListener("change", (e) => {
				if (e.target.classList.contains("sheet-select-checkbox")) {
					updateSelectAllState();
				}
			});
		}

		function buildListUrl(currentOffset) {
			const from = document.getElementById("fromDate").value;
			const to = document.getElementById("toDate").value;
			const approvalFilter = document.getElementById("approvalFilter").value;

			let url = `/api/checksheets?limit=${limit}&offset=${currentOffset}`;

			if (from && to) url += `&from=${from}&to=${to}`;
			else if (from) url += `&from=${from}`;
			else if (to) url += `&to=${to}`;

			if (approvalFilter) url += `&approvalStatus=${encodeURIComponent(approvalFilter)}`;

			return url;
		}

		async function resetAndLoad() {
			offset = 0;
			hasMore = true;
			isLoading = false;
			setListStatus("", false);

			area.innerHTML = "";

			// 전체선택 상태 초기화
			if (selectAllCheckbox) {
				selectAllCheckbox.checked = false;
				selectAllCheckbox.indeterminate = false;
			}

			await loadMore();
		}

		function setListStatus(text, show) {
			const el = document.getElementById("listStatus");
			if (!el) return;
			el.textContent = text || "";
			el.style.display = show ? "block" : "none";
		}

		async function loadMore() {
			if (!hasMore || isLoading) return;

			isLoading = true;
			setListStatus("불러오는 중...", true);

			try {
				const url = buildListUrl(offset);
				const res = await fetch(url);
				if (!res.ok) {
					alert("목록 조회 중 오류가 발생했습니다.");
					return;
				}

				const list = await res.json();

				if (offset === 0) area.innerHTML = "";

				if (!list || list.length === 0) {
					if (offset === 0) {
						area.innerHTML = `<p class="empty-text">조회된 점검표가 없습니다.</p>`;
					}
					return;
				}

				list.forEach((item) => area.appendChild(createCard(item)));

				offset += list.length;

				// 서버가 limit보다 적게 주면 끝
				if (list.length < limit) {
					hasMore = false;
					setListStatus("마지막입니다.", true);
				} else {
					setListStatus("", false);
				}

				// 리스트 추가 후 전체선택 상태 업데이트
				updateSelectAllState();
			} catch (err) {
				console.error(err);
				hasMore = false;
				alert("서버에 연결할 수 없습니다. 네트워크 상태를 확인해주세요.");
			} finally {
				isLoading = false;
				if (hasMore) setListStatus("", false);
			}
		}

		function setupInfiniteScroll() {
			const sentinel = document.getElementById("scrollSentinel");
			if (!sentinel) return;

			// 기존 observer 있으면 해제
			if (observer) observer.disconnect();

			observer = new IntersectionObserver((entries) => {
				const entry = entries[0];
				if (entry.isIntersecting) {
					loadMore();
				}
			}, {
				root: null,
				rootMargin: "200px", // 하단 200px 전에 미리 로드
				threshold: 0
			});

			observer.observe(sentinel);
		}

		// 초기 날짜: 오늘
		function initDates() {
			const now = new Date();

			const yyyy = now.getFullYear();
			const mm = String(now.getMonth() + 1).padStart(2, "0");
			const dd = String(now.getDate()).padStart(2, "0");

			const yyyyMmDd = `${yyyy}-${mm}-${dd}`;

			document.getElementById("fromDate").value = yyyyMmDd;
			document.getElementById("toDate").value = yyyyMmDd;
		}

		document.getElementById("searchBtn").addEventListener("click", resetAndLoad);

		window.addEventListener("scroll", () => {
			if (!hasMore || isLoading) return;
			const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 200;
			if (nearBottom) loadMore();
		});

		async function handleDeleteSubmit() {
			const selectedCheckboxes = Array.from(
				document.querySelectorAll(".sheet-select-checkbox:checked")
			);
			
			const ids = selectedCheckboxes.map(cb => Number(cb.value));

			// ✅ 선택된 점검표들의 날짜 수집
			const dates = selectedCheckboxes.map(cb => cb.dataset.checkDate);
			const uniqueDates = [...new Set(dates)];
			
			const payload = {
				sheetIds: ids
			};

			try {
				const res = await fetch("/api/checksheets/delete", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify(payload)
				});
				
				alert(
					`점검표 ${selectedCheckboxes.length}건의 삭제 요청을 서버로 전송했습니다.`
				);
				
				if (!res.ok) {
					throw new Error("서버 응답 오류: " + res.status);
				} else {
					const message = await res.json();
					if ("" != message.message) {
						alert(message.message);
					}
				}

				// 상신한 날짜로 검색조건 유지 후 재조회
				const d = uniqueDates[0];
				document.getElementById("fromDate").value = d;
				document.getElementById("toDate").value = d;

				await resetAndLoad();
				window.scrollTo(0, 0);
			} catch (err) {
				console.error(err);
				alert("전자결재 삭제 요청 중 오류가 발생했습니다.");
			}
		}

		async function handleApprovalSubmit() {
			// 1) 사번 확인
			const empNo = localStorage.getItem(KEY);
			const grpId = localStorage.getItem(userId);
			const grpPw = localStorage.getItem(userPw);

			if (!empNo) {
				alert("사번 정보가 저장 되어 있지 않아 로그인창으로 이동합니다.")
				location.replace("/checksheet-login.html");
				return;
			}

			const selectedCheckboxes = Array.from(
				document.querySelectorAll(".sheet-select-checkbox:checked")
			);

			const count = selectedCheckboxes.length;

			// 0개 선택
			if (count === 0) {
				alert("전자결재 상신할 점검표를 선택해 주세요.");
				return;
			}

			// 4개 아니면 상신 불가
			if (count !== 4) {
				alert(
					`전자결재 상신은 오전/오후 조립반·가공반 4개의 점검표가 모두 선택된 경우에만 가능합니다.\n\n현재 선택된 점검표 개수: ${count}개`
				);
				return;
			}

			// ✅ 선택된 점검표들의 날짜 수집
			const dates = selectedCheckboxes.map(cb => cb.dataset.checkDate);
			const uniqueDates = [...new Set(dates)];

			// 날짜가 1개가 아니면(섞여 있으면) 상신 불가
			if (uniqueDates.length !== 1) {
				alert(
					`선택된 점검표들의 점검일자가 서로 다릅니다.\n\n현재 선택된 날짜: ${uniqueDates.join(", ")}`
				);
				return;
			}

			// 여기까지 통과하면: 정확히 4개 + 모두 같은 날짜
			const ids = selectedCheckboxes.map(cb => Number(cb.value));

			const payload = {
				sheetIds: ids,
				empNo: empNo,
				grpId: grpId,
				grpPw: grpPw
			};

			try {
				alert(
					`전자결재 상신 요청을 서버로 전송했습니다.\n\n점검일자: ${uniqueDates[0]} / 점검표 4건`
				);
				
				const res = await fetch("/api/checksheets/approval", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify(payload)
				});

				const data = await res.json();
				
				console.log(data.message);
				
				if (!res.ok) {
					throw new Error(data.message);
				}

				// 상신한 날짜로 검색조건 유지 후 재조회
				const d = uniqueDates[0];
				document.getElementById("fromDate").value = d;
				document.getElementById("toDate").value = d;

				await resetAndLoad();
				window.scrollTo(0, 0);
			} catch (err) {
				alert(err);
			}
		}

		if (approvalSubmitBtn) {
			approvalSubmitBtn.addEventListener("click", handleApprovalSubmit);
		}

		window.addEventListener("load", async () => {
			// 1) 사번 확인
			const empNo = localStorage.getItem(KEY);
			if (!empNo) {
				location.replace("/checksheet-login.html");
				return;
			}

			initDates();
			await resetAndLoad();
			setupInfiniteScroll();
		});
	</script>
</body>

</html>
