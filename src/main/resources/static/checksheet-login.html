<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>점검표 로그인</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/checksheetLogin.css" />
  <link rel="shortcut icon" href="picon.ico" type="image/xicon" />
</head>
<body>
  <div class="container">
    <header class="app-header login-header">
      <h1 class="app-title">안전점검표</h1>
    </header>

    <div class="login-card">
      <h2 class="login-title">로그인</h2>
      <p class="login-sub">최초 1회만 입력하면 다음부터 자동으로 적용됩니다.</p>

      <form id="empForm" class="login-form">
        <div class="row">
          <label for="empID">그룹웨어 아이디</label>
          <input id="empID" name="empID" type="text" required />
        </div>
		
		<div class="row">
		<label for="empPW">그룹웨어 비밀번호</label>
		<input id="empPW" name="empPW" type="password" required />
		</div>

        <button class="login-btn" type="submit">로그인</button>
        <p class="error" id="errorMsg" hidden>아이디 또는 비밀번호가 올바르지 않습니다.</p>
      </form>
    </div>
  </div>

  <script>
    const KEY = "CHECKSHEET_EMP_NO";
	const userId = "CHECKSHEET_EMP_ID";
	const userPw = "CHECKSHEET_EMP_PW";
    const empInputID = document.getElementById("empID");
	const empInputPW = document.getElementById("empPW");
    const errorMsg = document.getElementById("errorMsg");

    // 이미 저장된 사번이 있으면 자동 진입 시도
    const saved = localStorage.getItem(KEY);
    if (saved) {
      location.replace("/checkSheet.html");
    }

    document.getElementById("empForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.hidden = true;

      const empID = (empInputID.value || "").trim();
	  const empPW = (empInputPW.value || "").trim();
      if (!empID || !empPW) return;
	  
      // 서버에 검증 요청하고 저장
      try {
        const res = await fetch("/api/checksheets/login", {
			method: "POST",
	        headers: {
	          "Content-Type": "application/json"
	        },
	        body: JSON.stringify({
	          empID,
	          empPW
	        })
		});
        if (!res.ok) {
          errorMsg.hidden = false;
          return;
        }
		
		const data = await res.json();
		
        localStorage.setItem(KEY, data.empNo);
		localStorage.setItem(userId, empID);
		localStorage.setItem(userPw, empPW);
        location.replace("/checkSheet.html");
      } catch {
        errorMsg.hidden = false;
      }
    });
  </script>
</body>
</html>
