<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스마트공장팀 링크 모음</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="picon.ico" type="image/xicon" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
		  
    <style>
		body {
		    margin: 0;
		    font-family: 'Segoe UI', sans-serif;
		    background: #ffffff; /* 전체 흰색 */
		}

		/* ===== 상단 바 ===== */
		.top-bar {
		    height: 70px;
		    background: #ffffff;
		    display: flex;
		    align-items: center;
		    padding: 0 10px;
		    border-bottom: 2px solid #e5e7eb;
			border-top: 4px solid #2E3192;
		}

		.logo-area {
		    display: flex;
		    align-items: center;
		    gap: 20px;
		}

		.logo-area img {
		    height: 38px;
		}

		.portal-title {
		    font-size: 18px;
		    font-weight: 600;
		    color: #2E3192; /* CI 블루 */
		    letter-spacing: 0.3px;
		}

		/* ===== 콘텐츠 영역 ===== */
		.container {
		    max-width: 1200px;
		    margin: 30px;
		    display: grid;
		    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
		    gap: 30px;
		}

		.content {
		    flex: 1;
		    padding: 50px;
		    overflow-y: auto;
		}

		/* ===== 카드 ===== */
		.card {
		    background: #ffffff;
		    border-radius: 10px;
		    padding: 26px;
		    text-decoration: none;
		    color: #111;
		    border: 1px solid #e5e7eb;
		    box-shadow: 0 4px 10px rgba(0,0,0,0.04);
		    transition: all 0.25s ease;
		    position: relative;
		}

		/* 좌측 CI 포인트 라인 */
		.card::before {
		    content: "";
		    position: absolute;
		    left: 0;
		    top: 0;
		    height: 100%;
		    width: 4px;
		    background: #2E3192;
		    border-radius: 10px 0 0 10px;
		}

		.card:hover {
		    transform: translateY(-4px);
		    box-shadow: 0 10px 22px rgba(0,0,0,0.08);
		}

		/* 제목 */
		.card .title {
		    font-size: 18px;
		    font-weight: 600;
		    margin-bottom: 8px;
		    color: #2E3192; /* CI 포인트 */
		}

		/* 설명 */
		.card .desc {
		    font-size: 14px;
		    color: #555;
		}
		
		.badge {
		    display: inline-block;
		    background: #2E3192;
		    color: white;
		    font-size: 11px;
		    padding: 4px 8px;
		    border-radius: 4px;
		    margin-bottom: 10px;
		}
		
		.icon {
		    width: 28px;
		    height: 28px;
		    background: #eef1ff;
		    color: #2E3192;
		    display: inline-flex;
		    align-items: center;
		    justify-content: center;
		    border-radius: 6px;
		    margin-right: 10px;
		    font-size: 14px;
		}
		
		.layout {
		    display: flex;
		    height: calc(100vh - 70px);
		}

		/* ===== 사이드바 ===== */
		.sidebar {
		    width: 220px;
		    background: #f5f7fa;
		    border-right: 1px solid #e5e7eb;
		    padding: 30px 20px;
		}

		.sidebar ul {
		    list-style: none;
		    padding: 0;
		}

		.sidebar li {
		    padding: 12px 10px;
		    margin-bottom: 8px;
		    cursor: pointer;
		    border-radius: 6px;
		    font-weight: 500;
		    color: #333;
		}

		.sidebar li.active {
		    background: #2E3192;
		    color: white;
		}

		.sidebar li:hover {
		    background: #e8ecff;
		}
    </style>
</head>

<body>

<header class="top-bar">
    <div class="logo-area">
        <img src="/daeyanglogo.png" alt="DAEYANG">
        <span class="portal-title">스마트공장팀 웹 페이지 링크 모음</span>
    </div>
</header>

<div class="layout">

    <!-- 좌측 사이드바 -->
    <aside class="sidebar">
        <ul id="categoryMenu"></ul>
    </aside>

    <!-- 우측 콘텐츠 -->
    <main class="content">
        <div class="container" id="linkContainer"></div>
    </main>

</div>

<script>
	const data = {
	    "AI": [
	        {
	            title: "지원 사업 탐색 페이지",
	            url: "http://10.10.102.10:8020/",
	            desc: "대양 맞춤 지원 사업 목록",
	            icon: "fa-file-contract"
	        },
			{
	            title: "AI Agent 시스템",
	            url: "https://20.41.121.156/",
	            desc: "대양전기공업 AI Agent",
	            icon: "fa-robot"
	        }
	    ],
		"Unity": [
		    {
		        title: "디지털 트윈 시스템 관리",
		        url: "http://10.10.102.10:8080/suggestionView.html",
		        desc: "의견함, 로그인 이력 조회",
		        icon: "fa-cube"
		    }
		],
		"모니터링": [
			{
	            title: "펀칭 장비 모니터링",
	            url: "http://10.10.104.70:7860/",
	            desc: "안전 AI 모니터링",
	            icon: "fa-desktop"
	        },
			{
	            title: "설비 가동 현황",
	            url: "http://10.10.102.10/Process1Line.html",
	            desc: "마린솔루션사업부 설비 가동현황",
	            icon: "fa-chart-line"
	        },
			{
	            title: "셔틀프레스",
	            url: "http://10.10.102.10/DigitalTwinShuttleLine.html",
	            desc: "셔틀프레스 디지털트윈",
	            icon: "fa-gears"
	        },
			{
			    title: "300Ton프레스",
			    url: "http://10.10.102.10/DigitalTwin300TonLine.html",
			    desc: "300Ton프레스 디지털트윈",
			    icon: "fa-weight-hanging"
			},
			{
			    title: "환경 모니터링",
			    url: "http://10.10.102.10/DigitalTwinEnvironment.html",
			    desc: "환경 모니터링",
			    icon: "fa-leaf"
			},
			{
			    title: "설비 알람 현황",
			    url: "http://10.10.102.10/AlarmMonitor.html",
			    desc: "마린솔루션사업부 설비알람 현황",
			    icon: "fa-triangle-exclamation"
			}
	    ],
	    "디지털전환": [
	        {
	            title: "현장 안전 점검",
	            url: "http://10.10.102.10:8082/checksheet-login.html",
	            desc: "현장 안전 점검표",
	            icon: "fa-clipboard-check"
	        }
	    ]
	};

	const categoryMenu = document.getElementById("categoryMenu");
	const linkContainer = document.getElementById("linkContainer");

	/* 카테고리 메뉴 생성 */
	Object.keys(data).forEach((category, index) => {
	    const li = document.createElement("li");
	    li.textContent = category;

	    if (index === 0) {
	        li.classList.add("active");
	        renderLinks(category);
	    }

	    li.onclick = () => {
	        document.querySelectorAll(".sidebar li")
	            .forEach(el => el.classList.remove("active"));
	        li.classList.add("active");
	        renderLinks(category);
	    };

	    categoryMenu.appendChild(li);
	});

	/* 카드 렌더링 */
	function renderLinks(category) {
	    linkContainer.innerHTML = "";

	    data[category].forEach(link => {
	        const a = document.createElement("a");
	        a.className = "card";
	        a.href = link.url;
			a.target = "_blank";
			a.rel = "noopener noreferrer";

	        a.innerHTML = `
	            <div class="title">
	                <i class="fa-solid ${link.icon} icon"></i>
	                ${link.title}
	            </div>
	            <div class="desc">${link.desc}</div>
	        `;

	        linkContainer.appendChild(a);
	    });
	}
</script>

</body>
</html>
