<!doctype html>
<html lang="ko">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<link rel="stylesheet" href="css/checksheetForm.css" />

</head>

<nav class="side-menu" id="sideMenu" aria-hidden="true">
	<div class="side-menu-header">
		<span class="side-menu-title">메뉴</span>
		<button type="button" class="menu-close" aria-label="메뉴 닫기">
			✕
		</button>
	</div>
	<ul class="side-menu-list">
		<li>
			<button type="button" class="side-menu-item" id="menuForm">
				점검표 작성
			</button>
		</li>
		<li>
			<button type="button" class="side-menu-item" id="menuChecksheetList">
				점검표 조회
			</button>
		</li>
		<li>
			<button type="button" class="side-menu-item" id="menuLogout">
				로그아웃
			</button>
		</li>
	</ul>
</nav>

<div class="side-menu-backdrop" id="sideMenuBackdrop"></div>

<body>
	<div class="container">
		<header class="app-header">
			<button type="button" class="menu-toggle" aria-label="메뉴 열기">
				<span></span>
				<span></span>
				<span></span>
			</button>

			<h1 class="app-title">
				안전한 일터 자체점검표
			</h1>
		</header>

		<!-- 상단 메타 정보 -->
		<fieldset>
			<legend>기본 정보</legend>
			<div class="fieldset-box">
				<div class="grid">
					<div class="row">
						<label for="date">점검일자</label>
						<div class="input-shell">
							<input id="date" name="date" type="date" required />
						</div>
					</div>
					<div class="row">
						<label for="dept">점검부서</label>
						<input id="dept" name="dept" type="text" value="생산팀(MS)" required />
					</div>
					<div class="form-row">
					  <label for="placeSelect">점검장소</label>
					  <select id="placeSelect" name="place" required>
						<option value="가공반">가공반</option>
						<option value="조립반">조립반</option>
					  </select>
					</div>
					<div class="row">
						<label for="inspector">점검자</label>
						<input id="inspector" name="inspector" type="text" placeholder="예: 홍길동" required />
					</div>
					<div class="row">
						<label for="startTime">점검 시작</label>
						<div class="input-shell">
							<input id="startTime" name="startTime" type="time" required />
						</div>
					</div>
					<div class="row">
						<label for="endTime">점검 종료</label>
						<div class="input-shell">
							<input id="endTime" name="endTime" type="time" required />
						</div>
					</div>
				</div>
			</div>
		</fieldset>

		<!-- 점검 섹션: JS에서 동적 렌더링 -->
		<div id="sections"></div>

		<!-- 하단 고정 버튼 -->
		<div class="actions">
			<button id="submitBtn">제출</button>
		</div>
	</div>

	<script>
		// === 햄버거 메뉴 토글 ===
		const menuToggle = document.querySelector(".menu-toggle");
		const sideMenu = document.getElementById("sideMenu");
		const sideMenuBackdrop = document.getElementById("sideMenuBackdrop");
		const menuCloseBtn = document.querySelector(".menu-close");
		
		const KEY = "CHECKSHEET_EMP_NO";
		const userId = "CHECKSHEET_EMP_ID";
		const userPw = "CHECKSHEET_EMP_PW";

		function openMenu() {
			sideMenu.classList.add("open");
			sideMenuBackdrop.classList.add("show");
			document.body.classList.add("no-scroll");
			sideMenu.setAttribute("aria-hidden", "false");
		}

		function closeMenu() {
			sideMenu.classList.remove("open");
			sideMenuBackdrop.classList.remove("show");
			document.body.classList.remove("no-scroll");
			sideMenu.setAttribute("aria-hidden", "true");
		}

		menuToggle.addEventListener("click", openMenu);
		menuCloseBtn.addEventListener("click", closeMenu);
		sideMenuBackdrop.addEventListener("click", closeMenu);

		// ESC 키로도 닫기
		document.addEventListener("keydown", (e) => {
			if (e.key === "Escape" && sideMenu.classList.contains("open")) {
				closeMenu();
			}
		});

		// === 메뉴 항목 클릭 ===
		document.getElementById("menuForm")
			.addEventListener("click", () => {
				closeMenu();
				location.href = "checkSheet.html";
			});

		document.getElementById("menuChecksheetList")
			.addEventListener("click", () => {
				closeMenu();
				location.href = "checksheet-list.html";
			});

		document.getElementById("menuLogout")
			.addEventListener("click", () => {
				closeMenu();
				localStorage.removeItem(KEY);
				localStorage.removeItem(userId);
				localStorage.removeItem(userPw);
				location.replace("/checksheet-login.html");
			});

		function formatDateLocal(d) {
			const y = d.getFullYear();
			const m = String(d.getMonth() + 1).padStart(2, "0");
			const day = String(d.getDate()).padStart(2, "0");
			return `${y}-${m}-${day}`;
		}

		// === 1) 기본 날짜 & 시간 ===
		const now = new Date();
		const dateInput = document.getElementById("date");
		const startInput = document.getElementById("startTime");
		const endInput = document.getElementById("endTime");

		// 오늘 날짜
		const todayStr = formatDateLocal(now);
		dateInput.value = todayStr;
		// 점검일자는 오늘 이후 날짜를 선택 못 하도록 제한
		dateInput.max = todayStr;

		// HH:mm 포맷으로 변환
		function toHHMM(d) {
			return d.toTimeString().slice(0, 5); // 예: "16:03"
		}

		// === 점검 시작/종료 기본값 (오전/오후 구분) ===
		const hour = now.getHours(); // 0~23

		if (hour < 12) {
		  // 오전
		  startInput.value = "09:00";
		  endInput.value = "10:00";
		} else {
		  // 오후

					{id: "personal-cooling-or-cooling-gear", label: "휴식 부여 곤란 시 개인용 냉방·통풍장치 또는 보냉장구 지급·가동"},
					{id: "heat-illness-emergency-response", label: "온열질환 의심자 발생 시 즉시 119 신고 등 응급조치"}

		};
		
		// 조립반 기본 점검결과 세팅
		const DEFAULT_RESULT_ASSEMBLY = {
			"opening-cover": "해당 없음",
			"vehicle-limit": "해당 없음",
		};

		// value alias (혹시 PASS/NA 쓰는 경우 대비)
		const RESULT_ALIASES = {
		  "적합": ["적합", "PASS", "OK"],
		  "부적합": ["부적합", "FAIL", "NG"],
		  "해당 없음": ["해당 없음", "NA", "N/A"]
		};

		function buildPlaceDefaults(place) {
		  const base = { ...DEFAULT_RESULT_MACHINING };

		  if (place === "조립반") {
		    return { ...base, ...DEFAULT_RESULT_ASSEMBLY };
		  }

		  return base;
		}

		// name 규칙: `${sectionId}.${itemId}.result`
		function toRadioName(sectionId, itemId) {
		  return `${sectionId}.${itemId}.result`;
		}

		function clearAllRadios() {
		  document.querySelectorAll('input[type="radio"]').forEach(r => (r.checked = false));
		}

		function applyDefaultsByPlace(place) {
		  const defaults = buildPlaceDefaults(place);

		  // ✅ 장소 바뀌면 강제로 전체를 해당 장소 기본값으로 세팅
		  clearAllRadios();

		  for (const sec of sections) {
		    for (const item of sec.items) {
		      const itemId = item.id;
		      const resultKor = defaults[itemId];
		      if (!resultKor) continue;

		      const nameKey = toRadioName(sec.id, itemId);
		      const radios = Array.from(
		        document.querySelectorAll(`input[type="radio"][name="${CSS.escape(nameKey)}"]`)
		      );
		      if (radios.length === 0) continue;

		      const candidates = RESULT_ALIASES[resultKor] || [resultKor];
		      const target = radios.find(r => candidates.includes((r.value || "").trim()));
		      if (target) {
		        target.checked = true;
		        target.dispatchEvent(new Event("change", { bubbles: true }));
		      }
		    }
		  }
		}
		
		// === 3) 동적 렌더링 ===
		const root = document.getElementById("sections");
		sections.forEach((sec) => {
			const secDiv = document.createElement("div");
			secDiv.className = "section";
			const h3 = document.createElement("h3");
			h3.textContent = sec.title;
			secDiv.appendChild(h3);

			sec.items.forEach((item) => {
				const wrap = document.createElement("div");
				wrap.className = "item";

				const title = document.createElement("div");
				title.className = "item-title";
				title.textContent = item.label;

		// === X) 유효성 검사 ===
		function validateForm() {
			const date = document.getElementById("date");
			const dept = document.getElementById("dept");
			const place = document.getElementById("placeSelect");
			const inspector = document.getElementById("inspector");
			const startTime = document.getElementById("startTime");
			const endTime = document.getElementById("endTime");

			// 상단 기본 정보 필수
			if (!date.value) {
				alert("점검일자를 입력해 주세요.");
				date.scrollIntoView({behavior: "smooth", block: "center"});
				date.focus();
				return false;
			}
			// 점검일자는 오늘 이후 날짜로 선택할 수 없음 (혹시 브라우저에서 우회했을 경우 대비)
			const todayStr = formatDateLocal(new Date());
			if (date.value > todayStr) {
				alert("점검일자는 오늘 이후 날짜로 선택할 수 없습니다.");
				date.scrollIntoView({behavior: "smooth", block: "center"});
				date.focus();
				return false;
			}
			if (!dept.value.trim()) {
				alert("점검부서를 확인해 주세요.");
				dept.scrollIntoView({behavior: "smooth", block: "center"});
				dept.focus();
				return false;
			}
			if (!place.value.trim()) {
				alert("점검장소를 입력해 주세요.");
				place.scrollIntoView({behavior: "smooth", block: "center"});
				place.focus();
				return false;
			}
			if (!inspector.value.trim()) {
				alert("점검자를 입력해 주세요.");
				inspector.scrollIntoView({behavior: "smooth", block: "center"});
				inspector.focus();
				return false;
			}
			if (!startTime.value) {
				alert("점검 시작 시간을 입력해 주세요.");
				startTime.scrollIntoView({behavior: "smooth", block: "center"});
				startTime.focus();
				return false;
			}
			if (!endTime.value) {
				alert("점검 종료 시간을 입력해 주세요.");
				endTime.scrollIntoView({behavior: "smooth", block: "center"});
				endTime.focus();
				return false;
			}
			
			const selectedDate = date.value;       // "YYYY-MM-DD"
			const selectedStart = startTime.value; // "HH:MM"
			const start = startInput.value;
			const end = endInput.value;
			
			if (selectedDate && selectedStart) {
				const selectedDateTime = new Date(`${selectedDate}T${selectedStart}`);
				const now = new Date();

				if (selectedDateTime.getTime() > now.getTime()) {
					alert("점검 시작 시간은 현재 시각 이후로 입력할 수 없습니다.");
					startTime.scrollIntoView({behavior: "smooth", block: "center"});
					startTime.focus();
					return false;
				}
				
				if (!isEndAfterStart(start, end)) {
				    alert("점검 종료 시간은 시작 시간보다 늦어야 합니다.");
				    endInput.focus();
				    e.preventDefault();
				    return;
				}
			}

			// 점검 항목 필수: 라디오 선택 여부 + 부적합이면 조치사항 필수
			for (const sec of sections) {
				for (const item of sec.items) {
					const result = document.querySelector(
						`input[name="${sec.id}.${item.id}.result"]:checked`
					);
					const action = document.querySelector(
						`textarea[name="${sec.id}.${item.id}.action"]`
					);

					if (!result) {
						alert(
							`[${sec.title}] "${item.label}" 항목의 점검결과를 선택해 주세요.`
						);
						// 해당 항목 위치로 스크롤
						const anyRadio = document.querySelector(
							`input[name="${sec.id}.${item.id}.result"]`
						);
						if (anyRadio) {
							anyRadio.scrollIntoView({behavior: "smooth", block: "center"});
							anyRadio.focus();
						}
						return false;
					}

					if (result.value === "부적합") {
						const text = action ? action.value.trim() : "";
						if (!text) {
							alert(
								`[${sec.title}] "${item.label}" 항목은 부적합이므로 조치사항을 입력해 주세요.`
							);
							if (action) {
								action.scrollIntoView({behavior: "smooth", block: "center"});
								action.focus();
							}
							return false;
						}
					}
				}
			}

			// 모든 검증 통과
			return true;
		}
		
		function isEndAfterStart(start, end) {
		  if (!start || !end) return true; // 값 없을 땐 검사 안 함
		  return end > start; // "HH:MM" 문자열은 이 비교가 그대로 먹힘
		}

					data.sections[sec.id][item.id] = {

		// === 이미지 압축 관련 유틸 ===
		// file: File -> Blob (리사이즈 + JPEG 압축)
		function resizeImageToBlob(file, maxWidth = 1600, maxHeight = 1600, quality = 0.8) {
			return new Promise((resolve, reject) => {
				const img = new Image();
				const url = URL.createObjectURL(file);

				img.onload = () => {
					let w = img.width;
					let h = img.height;

					// 비율 유지하면서 최대 크기 안으로 줄이기
					const scale = Math.min(maxWidth / w, maxHeight / h, 1);
					w = Math.round(w * scale);
					h = Math.round(h * scale);

					const canvas = document.createElement("canvas");
					canvas.width = w;
					canvas.height = h;
					const ctx = canvas.getContext("2d");
					ctx.drawImage(img, 0, 0, w, h);

					canvas.toBlob(
						(blob) => {
							URL.revokeObjectURL(url);
							if (!blob) {
								reject(new Error("이미지 압축 실패"));
								return;
							}
							resolve(blob);
						},
						"image/jpeg",
						quality
					);
				};

				img.onerror = () => {
					URL.revokeObjectURL(url);
					reject(new Error("이미지 로드 실패"));
				};

				img.src = url;
			});
		}

		// 일정 크기 이상이면 압축, 아니면 원본 그대로 사용
		async function compressImageIfNeeded(file) {
			const LIMIT = 1024 * 1024; // 1MB 이상이면 압축
			if (file.size <= LIMIT) {
				return file;
			}

			const blob = await resizeImageToBlob(file);
			const baseName = file.name.replace(/\.[^/.]+$/, ""); // 확장자 제거
			return new File([blob], `${baseName}.jpg`, {type: "image/jpeg"});
		}
