<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>배출시설 및 방지시설 운영기록부</title>
	<link rel="shortcut icon" href="picon.ico" type="image/xicon" />

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 24px;
			font-family: "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
			background: #f5f7fb;
			color: #222;
		}

		.container {
			max-width: 1400px;
			margin: 0 auto;
		}

		.page-header {
			background: #ffffff;
			border-radius: 16px;
			padding: 24px;
			box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
			margin-bottom: 20px;
		}

		.page-title {
			margin: 0 0 10px 0;
			font-size: 30px;
			font-weight: 800;
		}

		.page-note {
			margin: 0;
			font-size: 15px;
			color: #555;
		}

		.toolbar {
		    display: flex;
		    align-items: center;
		    gap: 10px;
		    flex-wrap: wrap;
		    margin: 20px 0;
		}

		.btn-save {
		    margin-left: auto;
		}

		.btn {
			border: none;
			border-radius: 10px;
			padding: 12px 18px;
			font-size: 14px;
			font-weight: 700;
			cursor: pointer;
			transition: 0.2s;
		}

		.btn:hover {
			transform: translateY(-1px);
		}

		.btn-primary {
			background: #1f5eff;
			color: white;
		}

		.btn-secondary {
			background: #e9eefc;
			color: #1f3b87;
		}

		.btn-danger {
			background: #ffefef;
			color: #c62828;
		}

		.record-card {
			background: #fff;
			border-radius: 16px;
			box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
			padding: 20px;
			margin-bottom: 24px;
			overflow-x: auto;
		}

		.record-top {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 14px;
			flex-wrap: wrap;
		}

		.record-title {
			font-size: 20px;
			font-weight: 800;
			margin: 0;
		}

		.date-area {
			display: flex;
			gap: 12px;
			align-items: center;
			flex-wrap: wrap;
		}

		.date-area label {
			font-weight: 700;
		}

		.date-area input,
		.date-area .weekday-box {
			height: 40px;
			border: 1px solid #d0d7e2;
			border-radius: 10px;
			padding: 0 12px;
			font-size: 14px;
			background: #fff;
		}

		.weekday-box {
			display: inline-flex;
			align-items: center;
			min-width: 100px;
			background: #f7f9fc;
			font-weight: 700;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			min-width: 1050px;
		}

		thead th {
			background: #f1f4f8;
			text-align: center;
			font-weight: 800;
			font-size: 14px;
			border: 1px solid #444;
			padding: 10px 8px;
		}

		tbody td {
			border: 1px solid #444;
			padding: 8px;
			font-size: 14px;
			vertical-align: middle;
		}

		.facility-name {
			font-weight: 700;
			background: #fafafa;
			text-align: center;
			min-width: 180px;
		}

		.sub-name {
			font-weight: 700;
			text-align: center;
			min-width: 120px;
			background: #fcfcfc;
		}

		.center {
			text-align: center;
		}

		.run-select,
		.text-input,
		.time-input,
		.power-input {
			width: 100%;
			height: 38px;
			border: 1px solid #cfd8e3;
			border-radius: 8px;
			padding: 0 10px;
			font-size: 14px;
			background: white;
		}

		.time-group {
			display: grid;
			grid-template-columns: 1fr auto 1fr;
			gap: 8px;
			align-items: center;
		}

		.time-divider {
			font-weight: 800;
			color: #444;
			text-align: center;
		}

		.disabled-cell input,
		.disabled-cell select {
			background: #f1f1f1 !important;
			color: #888;
		}

		.record-actions {
			display: flex;
			justify-content: flex-end;
			margin-top: 14px;
		}

		.empty-guide {
			background: #fff8e1;
			color: #7a5b00;
			border: 1px solid #f0d98a;
			border-radius: 12px;
			padding: 14px 16px;
			margin-bottom: 20px;
			font-size: 14px;
			font-weight: 600;
		}

		@media (max-width: 768px) {
			body {
				padding: 14px;
			}

			.page-title {
				font-size: 24px;
			}

			.record-title {
				font-size: 18px;
			}
		}

		@media print {
			body {
				background: #fff;
				padding: 0;
			}

			.page-header,
			.toolbar,
			.record-actions {
				display: none !important;
			}

			.record-card {
				box-shadow: none;
				border-radius: 0;
				padding: 0;
				margin-bottom: 20px;
			}

			.container {
				max-width: 100%;
			}

			input,
			select {
				border: none !important;
				background: transparent !important;
				appearance: none;
				-webkit-appearance: none;
			}
			
			.time-list {
			    display: flex;
			    flex-direction: column;
			    gap: 8px;
			}

			.time-range-row {
			    display: grid;
			    grid-template-columns: 1fr auto 1fr auto;
			    gap: 8px;
			    align-items: center;
			}

			.time-range-actions {
			    display: flex;
			    justify-content: flex-start;
			    margin-top: 8px;
			}

			.btn-small {
			    border: none;
			    border-radius: 8px;
			    padding: 6px 10px;
			    font-size: 12px;
			    font-weight: 700;
			    cursor: pointer;
			}

			.btn-add-time {
			    background: #e8f1ff;
			    color: #1f5eff;
			}

			.btn-remove-time {
			    background: #ffeaea;
			    color: #c62828;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="page-header">
			<h1 class="page-title">■ 배출시설 및 방지시설 운영기록부</h1>
			<p class="page-note">
				* 가동 없는 날은 가동여부 항목에 "X" 표기 할 것. (휴일 포함)
			</p>
		</div>

		<div class="empty-guide">
			날짜를 선택하고 각 설비별 가동여부, 가동시간, 전력사용량을 입력하세요.
			"X" 선택 시 가동시간/전력사용량 입력이 비활성화됩니다.
		</div>

		<div class="toolbar">
		    <button type="button" class="btn btn-primary" onclick="addRecord()">일자 추가</button>
		    <button type="button" class="btn btn-primary btn-save" onclick="saveRecords()">저장</button>
		</div>

		<div id="recordContainer"></div>
	</div>

	<script>
		let recordIndex = 0;

		const weekdayNames = ["일", "월", "화", "수", "목", "금", "토"];

		function getWeekdayLabel(dateString) {
			if (!dateString) return "";
			const date = new Date(dateString);
			if (isNaN(date.getTime())) return "";
			return weekdayNames[date.getDay()] + "요일";
		}

		function createRowHtml(recordId, facilityLabel, subLabel = "") {
		    const key = `${recordId}_${facilityLabel}_${subLabel || "main"}`.replace(/\s+/g, "_");

		    return `
		        <tr data-row-key="${key}" data-facility="${facilityLabel}" data-sub-label="${subLabel}">
		            <td class="facility-name">${facilityLabel}</td>
		            <td class="sub-name">${subLabel || "-"}</td>
		            <td class="center">
		                <select class="run-select" onchange="toggleRunState(this)">
		                    <option value="">선택</option>
		                    <option value="가동">가동</option>
		                    <option value="X">X</option>
		                </select>
		            </td>
		            <td>
		                <div class="time-list">
		                    ${createTimeRangeHtml()}
		                </div>
		                <div class="time-range-actions">
		                    <button type="button" class="btn-small btn-add-time" onclick="addTimeRange(this)">+ 시간추가</button>
		                </div>
		            </td>
		            <td>
		                <input type="text" class="power-input" placeholder="전력사용량 입력" />
		            </td>
		        </tr>
		    `;
		}

		function buildRecordHtml(recordId) {
			return `
            <div class="record-card" id="record_${recordId}">
                <div class="record-top">
                    <h2 class="record-title">운영기록</h2>
                    <div class="date-area">
                        <label for="date_${recordId}">날짜</label>
                        <input type="date" id="date_${recordId}" onchange="updateWeekday(${recordId})" />
                        <div class="weekday-box" id="weekday_${recordId}">요일</div>
                    </div>
                </div>

                <table>
                    <thead>
                    <tr>
                        <th style="width: 22%;">배출시설</th>
                        <th style="width: 16%;">세부구분</th>
                        <th style="width: 12%;">가동여부</th>
                        <th style="width: 30%;">가동시간</th>
                        <th style="width: 20%;">전력사용량</th>
                    </tr>
                    </thead>
                    <tbody>
                        ${createRowHtml(recordId, "건조 시설")}
                        ${createRowHtml(recordId, "탈지(세정) 시설")}
                        ${createRowHtml(recordId, "도장 시설 (1호기)")}
                        ${createGroupedPaintRows(recordId)}
                    </tbody>
                </table>

                <div class="record-actions">
                    <button type="button" class="btn btn-danger" onclick="removeRecord(${recordId})">이 일자 삭제</button>
                </div>
            </div>
        `;
		}

		function createGroupedPaintRows(recordId) {
		    const key1 = `${recordId}_paint_1`;
		    const key2 = `${recordId}_paint_2`;

		    return `
		        <tr data-row-key="${key1}" data-facility="도장 시설 (2호기)" data-sub-label="도장 작업">
		            <td class="facility-name" rowspan="2">도장 시설 (2호기)</td>
		            <td class="sub-name">도장 작업</td>
		            <td class="center">
		                <select class="run-select" onchange="toggleRunState(this)">
		                    <option value="">선택</option>
		                    <option value="가동">가동</option>
		                    <option value="X">X</option>
		                </select>
		            </td>
		            <td>
		                <div class="time-list">
		                    ${createTimeRangeHtml()}
		                </div>
		                <div class="time-range-actions">
		                    <button type="button" class="btn-small btn-add-time" onclick="addTimeRange(this)">+ 시간추가</button>
		                </div>
		            </td>
		            <td>
		                <input type="text" class="power-input" placeholder="전력사용량 입력" />
		            </td>
		        </tr>

		        <tr data-row-key="${key2}" data-facility="도장 시설 (2호기)" data-sub-label="브로워 작업">
		            <td class="sub-name">브로워 작업</td>
		            <td class="center">
		                <select class="run-select" onchange="toggleRunState(this)">
		                    <option value="">선택</option>
		                    <option value="가동">가동</option>
		                    <option value="X">X</option>
		                </select>
		            </td>
		            <td>
		                <div class="time-list">
		                    ${createTimeRangeHtml()}
		                </div>
		                <div class="time-range-actions">
		                    <button type="button" class="btn-small btn-add-time" onclick="addTimeRange(this)">+ 시간추가</button>
		                </div>
		            </td>
		            <td>
		                <input type="text" class="power-input" placeholder="전력사용량 입력" />
		            </td>
		        </tr>
		    `;
		}

		function addRecord() {
			recordIndex++;
			const container = document.getElementById("recordContainer");
			container.insertAdjacentHTML("beforeend", buildRecordHtml(recordIndex));
		}

		function removeRecord(id) {
			const target = document.getElementById(`record_${id}`);
			if (target) {
				target.remove();
			}
		}

		function updateWeekday(id) {
			const dateInput = document.getElementById(`date_${id}`);
			const weekdayBox = document.getElementById(`weekday_${id}`);
			weekdayBox.textContent = getWeekdayLabel(dateInput.value) || "요일";
		}

		function toggleRunState(selectElement) {
		    const row = selectElement.closest("tr");
		    const timeInputs = row.querySelectorAll(".time-input");
		    const powerInput = row.querySelector(".power-input");
		    const addButton = row.querySelector(".btn-add-time");

		    const isStopped = selectElement.value === "X";

		    timeInputs.forEach(input => {
		        input.disabled = isStopped;
		        if (isStopped) {
		            input.value = "";
		        }
		    });

		    if (powerInput) {
		        powerInput.disabled = isStopped;
		        if (isStopped) {
		            powerInput.value = "";
		        }
		    }

		    if (addButton) {
		        addButton.disabled = isStopped;
		    }

		    if (isStopped) {
		        const timeList = row.querySelector(".time-list");
		        const rows = timeList.querySelectorAll(".time-range-row");

		        rows.forEach((timeRow, index) => {
		            if (index > 0) {
		                timeRow.remove();
		            }
		        });

		        row.classList.add("disabled-cell");
		    } else {
		        row.classList.remove("disabled-cell");
		    }
		}
		
		function createTimeRangeHtml() {
		    return `
		        <div class="time-range-row">
		            <input type="time" class="time-input start-time" />
		            <div class="time-divider">~</div>
		            <input type="time" class="time-input end-time" />
		            <button type="button" class="btn-small btn-remove-time" onclick="removeTimeRange(this)">삭제</button>
		        </div>
		    `;
		}

		function addTimeRange(buttonElement) {
		    const row = buttonElement.closest("tr");
		    const timeList = row.querySelector(".time-list");
		    timeList.insertAdjacentHTML("beforeend", createTimeRangeHtml());
		}

		function removeTimeRange(buttonElement) {
		    const row = buttonElement.closest("tr");
		    const timeList = row.querySelector(".time-list");
		    const timeRows = timeList.querySelectorAll(".time-range-row");

		    if (timeRows.length <= 1) {
		        alert("최소 1개의 시간 입력칸은 남아 있어야 합니다.");
		        return;
		    }

		    buttonElement.closest(".time-range-row").remove();
		}

		function collectRecords() {
		    const recordCards = document.querySelectorAll(".record-card");
		    const dailyRecords = [];

		    recordCards.forEach((card) => {
		        const recordId = card.id.replace("record_", "");
		        const dateValue = document.getElementById(`date_${recordId}`)?.value || "";
		        const weekdayValue = document.getElementById(`weekday_${recordId}`)?.textContent || "";

		        const rows = card.querySelectorAll("tbody tr");
		        const items = [];

		        rows.forEach((row) => {
		            const facilityName = row.dataset.facility || "";
		            const subLabel = row.dataset.subLabel || "";

		            const runYn = row.querySelector(".run-select")?.value || "";
		            const powerUsage = row.querySelector(".power-input")?.value || "";

		            const timeRangeRows = row.querySelectorAll(".time-range-row");
		            const timeRanges = [];

		            timeRangeRows.forEach((timeRow) => {
		                const startTime = timeRow.querySelector(".start-time")?.value || "";
		                const endTime = timeRow.querySelector(".end-time")?.value || "";

		                timeRanges.push({
		                    startTime: startTime,
		                    endTime: endTime
		                });
		            });

		            items.push({
		                facilityName: facilityName,
		                subLabel: subLabel,
		                operationStatus: runYn,
		                powerUsage: powerUsage,
		                timeRanges: timeRanges
		            });
		        });

		        dailyRecords.push({
		            operationDate: dateValue,
		            weekday: weekdayValue,
		            items: items
		        });
		    });

		    return {
		        dailyRecords: dailyRecords
		    };
		}

		async function saveRecords() {
		    try {
		        const payload = collectRecords();

		        if (!payload.dailyRecords || payload.dailyRecords.length === 0) {
		            alert("저장할 데이터가 없습니다.");
		            return;
		        }

		        for (const record of payload.dailyRecords) {
		            if (!record.operationDate) {
		                alert("날짜를 선택하지 않은 항목이 있습니다.");
		                return;
		            }

		            for (const item of record.items) {
		                const labelText = item.subLabel
		                    ? `${item.facilityName} - ${item.subLabel}`
		                    : item.facilityName;

		                if (!item.operationStatus) {
		                    alert(`"${labelText}" 항목의 가동여부를 선택하세요.`);
		                    return;
		                }

		                if (item.operationStatus === "가동") {
		                    if (!item.timeRanges || item.timeRanges.length === 0) {
		                        alert(`"${labelText}" 항목의 가동시간을 입력하세요.`);
		                        return;
		                    }

		                    for (const range of item.timeRanges) {
		                        if (!range.startTime || !range.endTime) {
		                            alert(`"${labelText}" 항목의 가동시간을 모두 입력하세요.`);
		                            return;
		                        }

		                        if (range.startTime >= range.endTime) {
		                            alert(`"${labelText}" 항목의 가동시간이 올바르지 않습니다.`);
		                            return;
		                        }
		                    }
		                }
		            }
		        }

		        const response = await fetch("/api/emission-facility-log/save", {
		            method: "POST",
		            headers: {
		                "Content-Type": "application/json"
		            },
		            body: JSON.stringify(payload)
		        });

		        const result = await response.json();

		        if (response.ok) {
		            alert(result.message || "저장되었습니다.");
		        } else {
		            alert(result.message || "저장 중 오류가 발생했습니다.");
		        }
		    } catch (error) {
		        console.error(error);
		        alert("저장 중 오류가 발생했습니다.");
		    }
		}
		// 최초 1개 기본 생성
		addRecord();
	</script>
</body>

</html>
