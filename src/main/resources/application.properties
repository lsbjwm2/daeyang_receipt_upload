spring.application.name=ReceiptUpload

# //*********************개발용 설정***********************//
# 서버 포트 설정
server.port=8083

# 로깅 설정
logging.level.com.daeyang.ReceiptUpload=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.namedparam.NamedParameterJdbcTemplate=DEBUG

# 영수증 사진 저장 경로
receipt.storage.base-path=D:/DIS/FileBox/ACC_File/ReceiptIMG

# 활성 로그 파일 경로 (현재 파일)
logging.file.name=D:/ReceiptUploadLog/receipt-upload.log
# 날짜별(+ 사이즈별) 롤링 파일 네이밍
logging.logback.rollingpolicy.file-name-pattern=D:/ReceiptUploadLog/receipt-upload-%d{yyyy-MM-dd}.%i.log

# //************************끝**************************//

# //*********************배포용 설정***********************//
